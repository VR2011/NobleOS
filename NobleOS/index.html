<!DOCTYPE html>
<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url("Images/bg.png");
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Nunito', sans-serif;
        }

        #aboutWindow {
            display: none;
            width: 500px;
            height: 1000px;
            border: 2px solid black;
            background-image: linear-gradient(to right, #FCF3A0, #E4C267);
            position: absolute;
            top: 100px;
            left: 100px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            overflow: auto;
        }

        #aboutTitleBar {
            background-color: #d4a017;
            padding: 10px;
            cursor: move;
            user-select: none;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            cursor: pointer;
            font-size: 25px;
            background-color: #00000000;
            border: 1px solid #00000000;
        }

        #aboutContent {
            padding: 15px;
        }
    </style>
</head>

<body>

    <button onclick="openAboutWindow()"
        style="
        background-color: darkgoldenrod;
        border: goldenrod;
        border-radius: 20%;
        width: 75px;
        height: 75px;
        cursor: pointer;
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 1000;">

        <img src="Images/information.png" width="50">
    </button>

    <div id="aboutWindow">

        <div id="aboutTitleBar">
            <span>About</span>
            <button class="close-btn" onclick="closeAboutWindow()">⤫</button>
        </div>

        <div id="aboutContent">
            <img src="Images/nobleos.png" width="400">
            <p>Created by @vrplays. HEAVY WIP.</p>
        </div>

    </div>

    <script>
        const aboutWindow = document.getElementById("aboutWindow");
        const titleBar = document.getElementById("aboutTitleBar");

        let isDragging = false;
        let offsetX = 0;
        let offsetY = 0;

        titleBar.addEventListener("mousedown", (e) => {
            isDragging = true;

            offsetX = e.clientX - aboutWindow.offsetLeft;
            offsetY = e.clientY - aboutWindow.offsetTop;
        });

        document.addEventListener("mousemove", (e) => {
            if (!isDragging) return;

            aboutWindow.style.left = (e.clientX - offsetX) + "px";
            aboutWindow.style.top = (e.clientY - offsetY) + "px";
        });

        document.addEventListener("mouseup", () => {
            isDragging = false;
        });

        function openAboutWindow() {
            aboutWindow.style.display = "block";
        }

        function closeAboutWindow() {
            aboutWindow.style.display = "none";
        }
    </script>

</body>
</html>
