<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
</head>

<body>
    <div class="aboutButton">
        <button onclick="openWindow('aboutWindow')"
        style="
        background-color: darkgoldenrod;
        border: goldenrod;
        border-radius: 20%;
        width: 75px;
        height: 75px;
        cursor: pointer;">

        <img src="Images/information.png" width="50">
        </button>
        <p class="aboutButtonText">About</p>
    </div>
    <div id="aboutWindow" class="window">

        <div id="aboutTitleBar" class="title-bar">
            <span>About</span>
            <button class="close-btn" onclick="closeWindow(this)">⤫</button>
        </div>

        <div id="aboutContent">
            <img src="Images/nobleos.png" width="400">
            <p>Created by @vrplays. HEAVY WIP.</p>

            <p>NobleOS is a simple Operating System built entirely in your browser. It contains multiple apps like a calculator, clock, and browser.</p>
            <em>NobleOS was created during the Stardance challenge.</em>
        </div>

    </div>

    <div class="calculator">
        <button onclick="openWindow('calculatorWindow')"
        style="background-color: darkgoldenrod;
        border: goldenrod;
        border-radius: 20%;
        width: 75px;
        height: 75px;
        cursor: pointer;">
        <img src="Images/calc.png" width="50">
        </button>
        <p class="calculatorText">Calculator</p>
    </div>
    <div id="calculatorWindow" class="window">
        <div id="calculatorTitleBar" class="title-bar">
            <span>Calculator</span>
            <button class="close-btn" onclick="closeWindow(this)">⤫</button>
        </div>
        <input type="text" id="display" readonly placeholder="0">
        <div class="calculatorButtons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="appendValue('/')" class="operator">/</button>
            <button onclick="appendValue('*')" class="operator">*</button>
            <button onclick="appendValue('-')" class="operator">-</button>
            
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('+')" class="operator">+</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button style="grid-row: span 3; height: 100%;" onclick="calculate()" class="operator">=</button>
            
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            
            <button style="grid-column: span 2;" onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
        </div>
    </div>



    <script>
        let draggingWindow = null;
        let offsetX = 0;
        let offsetY = 0;
        let zTop = 1000;

        document.addEventListener("mousedown", (e) => {
            const win = e.target.closest(".window");
            if (win) win.style.zIndex = ++zTop;

            const titleBar = e.target.closest(".title-bar");
            if (!titleBar) return;
            draggingWindow = titleBar.parentElement;
            offsetX = e.clientX - draggingWindow.offsetLeft;
            offsetY = e.clientY - draggingWindow.offsetTop;
        });

        document.addEventListener("mousemove", (e) => {
            if (!draggingWindow) return;
            draggingWindow.style.left = (e.clientX - offsetX) + "px";
            draggingWindow.style.top = (e.clientY - offsetY) + "px";
        });

        document.addEventListener("mouseup", () => {
            draggingWindow = null;
        });

        function openWindow(id) {
            document.getElementById(id).style.display = "block";
        }

        function closeWindow(btn) {
            btn.closest(".window").style.display = "none";
        }

        const display = document.getElementById('display');
        const operators = ['+', '-', '*', '/'];

        function appendValue(input) {
            if (display.value === 'Error') return;
            if (operators.includes(input) && operators.includes(display.value.slice(-1))) return;
            display.value += input;
        }

        function clearDisplay() {
            display.value = '';
        }

        function calculate() {
            try {
                const result = eval(display.value);
                display.value = (result === Infinity || result === -Infinity) ? 'Error' : result;
            } catch {
                display.value = 'Error';
            }
        }
    </script>

</body>
</html>
